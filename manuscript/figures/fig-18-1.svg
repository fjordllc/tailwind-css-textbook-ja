<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">図 18-1 ダークモードではトークンの値だけが差し替わる</title>
  <desc id="desc">ライトとダークで同じクラス列 bg-surface text-foreground を使いながら、:root と .dark の変数値だけが変わる図。</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
    .label { font: 600 18px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    .small { font: 500 15px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
    .tiny { font: 500 13px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #475569; }
    .mono { font: 600 14px "SFMono-Regular", Consolas, monospace; fill: #0f172a; }
    .line { stroke: #94a3b8; stroke-width: 2; }
    .arrow { fill: #94a3b8; }
    .chip { rx: 12; }
    .surface-light { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .surface-dark { fill: #0f172a; stroke: #334155; stroke-width: 1.5; }
    .text-light { fill: #0f172a; }
    .text-dark { fill: #e2e8f0; }
    .note { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 12; }
  </style>

  <rect x="0" y="0" width="960" height="360" class="bg"/>
  <text x="40" y="42" class="label">図 18-1　同じクラス列のまま、`:root` と `.dark` でトークン値だけを差し替える。</text>

  <rect x="40" y="70" width="880" height="220" class="panel"/>

  <rect x="70" y="110" width="360" height="150" class="surface-light"/>
  <text x="92" y="136" class="small">ライト</text>
  <text x="92" y="160" class="tiny">:root</text>
  <rect x="92" y="182" width="100" height="32" class="chip surface-light"/>
  <rect x="202" y="182" width="100" height="32" class="chip surface-light"/>
  <text x="108" y="203" class="tiny text-light">surface</text>
  <text x="222" y="203" class="tiny text-light">foreground</text>
  <text x="92" y="238" class="mono">bg-surface text-foreground</text>

  <rect x="530" y="110" width="360" height="150" class="surface-dark"/>
  <text x="552" y="136" class="small" fill="#e2e8f0">ダーク</text>
  <text x="552" y="160" class="tiny" fill="#cbd5e1">.dark</text>
  <rect x="552" y="182" width="100" height="32" class="chip" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <rect x="662" y="182" width="100" height="32" class="chip" fill="#111827" stroke="#475569" stroke-width="1.5"/>
  <text x="566" y="203" class="tiny text-dark">surface</text>
  <text x="676" y="203" class="tiny text-dark">foreground</text>
  <text x="552" y="238" class="mono" fill="#e2e8f0">bg-surface text-foreground</text>

  <line x1="432" y1="185" x2="520" y2="185" class="line"/>
  <polygon points="520,185 508,178 508,192" class="arrow"/>
  <text x="446" y="172" class="tiny">値だけ差し替え</text>
  <text x="431" y="214" class="tiny">クラス列は同じ</text>

  <rect x="40" y="302" width="880" height="36" class="note"/>
  <text x="62" y="326" class="small">HTML は `bg-surface text-foreground` のまま。変わるのは `--color-surface` と `--color-foreground` の値だけ。</text>
</svg>
