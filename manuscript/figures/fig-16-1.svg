<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">図 16-1 Grid の列とスパン</title>
  <desc id="desc">grid-cols-3 の格子に col-span-2 のセルがまたがる様子を示す図。</desc>
  <rect width="960" height="280" fill="#ffffff"/>
  <style>
    .label { font: 600 18px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    .small { font: 500 14px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
    .cell { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 12; }
    .cell2 { fill: #dbeafe; stroke: #60a5fa; stroke-width: 2; rx: 12; }
    .grid { stroke: #cbd5e1; stroke-width: 2; }
  </style>
  <text x="40" y="38" class="label">図 16-1　Grid は「何列ぶん占めるか」を数で扱う。`col-span-2` は 2 列ぶん。</text>
  <rect x="40" y="58" width="880" height="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="14"/>
  <line x1="160" y1="90" x2="160" y2="200" class="grid"/>
  <line x1="380" y1="90" x2="380" y2="200" class="grid"/>
  <line x1="600" y1="90" x2="600" y2="200" class="grid"/>
  <line x1="820" y1="90" x2="820" y2="200" class="grid"/>
  <rect x="80" y="104" width="180" height="84" class="cell2"/>
  <text x="130" y="154" class="small">col-span-2</text>
  <rect x="300" y="104" width="180" height="84" class="cell"/>
  <text x="365" y="154" class="small">1</text>
  <rect x="520" y="104" width="180" height="84" class="cell"/>
  <text x="585" y="154" class="small">1</text>
  <rect x="740" y="104" width="100" height="84" class="cell"/>
  <text x="778" y="154" class="small">余り</text>
  <text x="80" y="224" class="small">`grid-cols-3` の上で、`col-span-2` が 2 列ぶんを使う。</text>
</svg>
