<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">図 5-1 @theme の変数は CSS 変数とユーティリティの両方になる</title>
  <desc id="desc">@theme の 1 つの定義が、CSS 変数とユーティリティクラスの 2 つに分かれる様子を示した図。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fbfe; stroke: #d8e1ea; stroke-width: 2; }
      .chip { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; }
      .label { font: 700 22px sans-serif; fill: #0369a1; }
      .text { font: 600 19px sans-serif; fill: #0f172a; }
      .note { font: 500 16px sans-serif; fill: #475569; }
      .code { font: 600 18px monospace; fill: #0f172a; }
      .arrow { stroke: #0284c7; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="540"/>

  <rect class="box" x="360" y="30" width="480" height="110" rx="18" ry="18"/>
  <text class="label" x="390" y="72">1 つの定義</text>
  <rect class="chip" x="390" y="84" width="420" height="34" rx="10" ry="10"/>
  <text class="code" x="410" y="107">@theme { --color-mint-500: oklch(...); }</text>

  <path class="arrow" d="M600 140 L600 186"/>
  <text class="note" x="625" y="176">2 つに分岐</text>

  <rect class="box" x="90" y="240" width="420" height="180" rx="18" ry="18"/>
  <text class="label" x="120" y="282">① CSS 変数</text>
  <rect class="chip" x="120" y="300" width="360" height="52" rx="12" ry="12"/>
  <text class="code" x="145" y="333">:root { --color-mint-500: ... }</text>
  <text class="note" x="120" y="388">→ var(--color-mint-500) で使える</text>

  <rect class="box" x="690" y="240" width="420" height="180" rx="18" ry="18"/>
  <text class="label" x="720" y="282">② ユーティリティ</text>
  <rect class="chip" x="720" y="300" width="360" height="52" rx="12" ry="12"/>
  <text class="code" x="745" y="333">.bg-mint-500 { ... }</text>
  <text class="note" x="720" y="388">→ class として使える</text>

  <path class="arrow" d="M600 186 C500 214, 420 222, 300 240"/>
  <path class="arrow" d="M600 186 C700 214, 780 222, 900 240"/>
</svg>
