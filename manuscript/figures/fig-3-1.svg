<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">図 3-1 依存の向きの反転</title>
  <desc id="desc">従来の .hero-title 方式は CSS が HTML に依存し、Tailwind は HTML が CSS に依存する関係を示す図。</desc>
  <rect width="960" height="280" fill="#ffffff"/>
  <style>
    .label { font: 600 18px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    .small { font: 500 14px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
    .card { rx: 14; stroke-width: 2; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; }
  </style>
  <text x="40" y="38" class="label">図 3-1　Tailwind は「HTML がどのクラスを使うか」で決まる。依存の向きが逆になる。</text>
  <rect x="40" y="58" width="880" height="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="14"/>
  <rect x="80" y="96" width="320" height="96" class="card" fill="#fff7ed" stroke="#fdba74"/>
  <text x="100" y="124" class="small">従来</text>
  <text x="100" y="150" class="small">CSS → HTML</text>
  <text x="100" y="176" class="small">`.hero-title` という名前を CSS が先に決める</text>
  <line x1="300" y1="144" x2="360" y2="144" class="arrow"/>
  <polygon points="360,144 350,138 350,150" fill="#64748b"/>

  <rect x="560" y="96" width="320" height="96" class="card" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="580" y="124" class="small">Tailwind</text>
  <text x="580" y="150" class="small">HTML → CSS</text>
  <text x="580" y="176" class="small">HTML が使うクラスを CSS が提供する</text>
  <line x1="520" y1="144" x2="440" y2="144" class="arrow"/>
  <polygon points="440,144 450,138 450,150" fill="#64748b"/>
</svg>
