<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">図 4-1 テンプレート走査 → 必要なクラスだけ生成</title>
  <desc id="desc">ソースファイルを Tailwind エンジンが走査し、使われているクラスだけを CSS に生成する流れを示した図。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fbfe; stroke: #d8e1ea; stroke-width: 2; rx: 18; ry: 18; }
      .panel2 { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 30px sans-serif; fill: #0f172a; }
      .label { font: 700 22px sans-serif; fill: #0369a1; }
      .text { font: 500 20px sans-serif; fill: #1f2937; }
      .small { font: 500 18px sans-serif; fill: #475569; }
      .code { font: 600 22px monospace; fill: #0f172a; }
      .code2 { font: 600 18px monospace; fill: #0f172a; }
      .muted { font: 500 18px sans-serif; fill: #64748b; }
      .line { stroke: #0284c7; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 9 8; fill: none; }
      .accent { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; rx: 12; ry: 12; }
      .accent2 { fill: #eff6ff; stroke: #0284c7; stroke-width: 2; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0284c7" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="560"/>

  <rect class="panel" x="40" y="100" width="260" height="360"/>
  <text class="label" x="70" y="142">①ソースを走査</text>
  <text class="text" x="70" y="190">index.html</text>
  <rect class="accent" x="70" y="208" width="190" height="50"/>
  <text class="code" x="88" y="241">class="p-6"</text>
  <rect class="accent" x="70" y="270" width="190" height="50"/>
  <text class="code" x="88" y="303">class="text-center"</text>
  <text class="text" x="70" y="358">Card.jsx</text>
  <rect class="accent2" x="70" y="376" width="190" height="46"/>
  <text class="code2" x="86" y="406">...p-6...</text>

  <rect class="panel2" x="470" y="110" width="260" height="340"/>
  <text class="label" x="500" y="152">②収集する</text>
  <text class="text" x="500" y="202">Tailwind エンジン</text>
  <circle cx="610" cy="262" r="58" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text class="title" x="610" y="272" text-anchor="middle">⚙</text>
  <text class="small" x="500" y="336">クラス名らしき文字列だけ拾う</text>
  <text class="muted" x="500" y="372">使われないものは最初から候補に入らない</text>

  <rect class="panel" x="860" y="70" width="300" height="420"/>
  <text class="label" x="890" y="112">③必要な分だけ生成</text>
  <rect class="accent2" x="890" y="138" width="240" height="96"/>
  <text class="code" x="910" y="176">.p-6 {</text>
  <text class="code2" x="910" y="206">  padding: calc(...)</text>
  <text class="code" x="910" y="236">}</text>
  <rect class="accent2" x="890" y="250" width="240" height="96"/>
  <text class="code" x="910" y="288">.text-center {</text>
  <text class="code2" x="910" y="318">  text-align: center;</text>
  <text class="code" x="910" y="348">}</text>
  <text class="small" x="890" y="390">※ m-99 のような未使用クラスは出力されない</text>
  <text class="small" x="890" y="422">→ CSS が線形に増えない</text>

  <path class="line" d="M300 270 C360 270, 390 270, 470 270"/>
  <path class="line" d="M730 270 C790 270, 820 270, 860 270"/>
  <path class="dash" d="M290 150 L840 150"/>
  <text class="muted" x="360" y="136">ソースに出たクラスだけ拾う</text>
</svg>
