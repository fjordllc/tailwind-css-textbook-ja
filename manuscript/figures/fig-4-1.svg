<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">図 4-1 テンプレート走査 → 必要なクラスだけ生成</title>
  <desc id="desc">ソースファイルにあるクラスだけを拾い、必要な CSS だけを生成する流れを 3 段で示した図。</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fbfe; stroke: #d8e1ea; stroke-width: 2; }
      .chip { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; }
      .chip2 { fill: #eff6ff; stroke: #0284c7; stroke-width: 2; }
      .label { font: 700 22px sans-serif; fill: #0369a1; }
      .text { font: 600 20px sans-serif; fill: #0f172a; }
      .note { font: 500 17px sans-serif; fill: #475569; }
      .code { font: 600 18px monospace; fill: #0f172a; }
      .arrow { stroke: #0284c7; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="440"/>

  <rect class="box" x="50" y="80" width="260" height="230" rx="18" ry="18"/>
  <text class="label" x="78" y="120">① ソース</text>
  <text class="text" x="78" y="166">index.html</text>
  <rect class="chip" x="78" y="185" width="170" height="42" rx="12" ry="12"/>
  <text class="code" x="96" y="213">class="p-6"</text>
  <rect class="chip2" x="78" y="236" width="190" height="42" rx="12" ry="12"/>
  <text class="code" x="96" y="264">class="text-center"</text>

  <rect class="box" x="470" y="80" width="260" height="230" rx="18" ry="18"/>
  <text class="label" x="498" y="120">② 収集</text>
  <circle cx="600" cy="188" r="54" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text class="text" x="600" y="196" text-anchor="middle">⚙</text>
  <text class="note" x="498" y="262">使われた文字列だけ拾う</text>

  <rect class="box" x="890" y="80" width="260" height="230" rx="18" ry="18"/>
  <text class="label" x="918" y="120">③ 生成</text>
  <rect class="chip2" x="918" y="146" width="176" height="54" rx="12" ry="12"/>
  <text class="code" x="938" y="177">.p-6 { ... }</text>
  <rect class="chip2" x="918" y="210" width="176" height="54" rx="12" ry="12"/>
  <text class="code" x="938" y="241">.text-center { ... }</text>
  <text class="note" x="918" y="287">未使用クラスは出力されない</text>

  <path class="arrow" d="M310 195 C360 195, 395 195, 470 195"/>
  <path class="arrow" d="M730 195 C780 195, 815 195, 890 195"/>
</svg>
